    <script>
      (function () {
        var form = document.getElementById("contactForm");
        if (!form) return;
        var input = document.getElementById("contactEmail");
        var note = document.getElementById("formNote");
        var RECIPIENT = "hello@studiothree.agency";
        var EMAIL_RE = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

        form.addEventListener("submit", function (e) {
          e.preventDefault();
          var email = (input.value || "").trim();

          if (!EMAIL_RE.test(email)) {
            if (note) note.textContent = "Please enter a valid email address.";
            input.focus();
            return;
          }



          var subject = "I'd like to know more — Studio003";
          var body =
            "Hello Studio Three Team,\n\n" +
            "I'd like to connect regarding a potential creative project.\n\n" +
            "Please reach out to discuss my requirements and how Studio Three can support our goals through videos, photos or creative content.\n\n" +
            "My preferred contact email is: " + email + "\n\n" +
            "I look forward to hearing from your team.\n\n" +
            "Best regards,\n" ;

          var mailto =
            "mailto:" + RECIPIENT +
            "?subject=" + encodeURIComponent(subject) +
            "&body=" + encodeURIComponent(body);

          window.location.href = mailto;

          if (note)
            note.textContent =
              "Opening your email app with a message ready to send to Studio003…";
        });
      })();
    </script>
